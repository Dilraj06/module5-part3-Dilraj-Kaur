services:
  mongo:
    image: mongo:6
    container_name: banking-mongo
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: banking-backend
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/bank_app
    ports:
      - "5000:5000"

  transactions:
    build: ./transactions
    container_name: banking-transactions
    depends_on:
      - mongo
    ports:
      - "3000:3000"

  frontend:
    build: ./studentportfolio
    container_name: banking-frontend

  nginx:
    image: nginx:alpine
    container_name: banking-nginx
    depends_on:
      - backend
      - transactions
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro